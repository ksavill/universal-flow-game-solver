<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- board -->
  <rect width="64" height="64" rx="12" fill="#0b0d12"/>
  <!-- 3x3 grid lines -->
  <g stroke="#232a36" stroke-width="2">
    <line x1="23" y1="6" x2="23" y2="58"/>
    <line x1="41" y1="6" x2="41" y2="58"/>
    <line x1="6" y1="23" x2="58" y2="23"/>
    <line x1="6" y1="41" x2="58" y2="41"/>
  </g>
  <!-- green flow: top-left -> bottom-right -->
  <path d="M14 14 L14 50 L50 50" fill="none" stroke="#4caf7d" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="14" cy="14" r="7.5" fill="#4caf7d"/>
  <circle cx="50" cy="50" r="7.5" fill="#4caf7d"/>
  <!-- red flow: top-right -> center -->
  <path d="M50 14 L32 14 L32 32" fill="none" stroke="#ff5252" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="14" r="7.5" fill="#ff5252"/>
  <circle cx="32" cy="32" r="7.5" fill="#ff5252"/>
</svg>
