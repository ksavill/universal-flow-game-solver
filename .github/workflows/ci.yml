name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "23 7 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        run: python -m pip install -e . pytest httpx
      - name: Backend tests
        run: python -m pytest -q
      - name: Curated puzzle regression
        run: python scripts/validate_puzzles.py --jobs 4
      - name: Solver performance regression
        run: >-
          python scripts/benchmark_solver.py --warmup 1 --repeat 3
          --baseline tests/golden/benchmark_baseline.json --max-drift 2
      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build
      - name: Full screenshot archive sweep
        if: github.event_name == 'schedule'
        run: python scripts/validate_puzzles.py --include-imports --jobs 8 --quiet
