services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: >-
      uvicorn backend.app:app --host 0.0.0.0 --port 8000
      --workers ${API_WORKERS:-2}
    expose:
      - "8000"
    restart: unless-stopped
    environment:
      RELOAD: "0"
      CORS_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost}
      FLOW_IMAGE_PIPELINE_CONCURRENCY: ${FLOW_IMAGE_PIPELINE_CONCURRENCY:-3}
    volumes:
      - ./puzzles:/app/puzzles
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

